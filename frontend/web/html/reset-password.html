<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>U-Konek+ - Reset Password</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrap">
        <div class="card" role="main">
            <div class="brand">
                <h1>Reset Password</h1>
                <h4>Enter your new password below.</h4>
            </div>

            <form id="reset-password-form" novalidate>
                <div class="field">
                    <label class="inputLabel" for="new-password">New Password</label>
                    <input id="new-password" type="password" placeholder="Minimum 6 characters" required />
                </div>

                <div class="field">
                    <label class="inputLabel" for="confirm-new-password">Confirm New Password</label>
                    <input id="confirm-new-password" type="password" placeholder="Repeat your password" required />
                </div>

                <div class="actions">
                    <button type="submit" class="btn" id="reset-password-submit-btn">
                        <span class="btn-spinner" aria-hidden="true"></span>
                        <span class="btn-label">RESET PASSWORD</span>
                    </button>
                </div>
                <div id="reset-password-msg" class="note" aria-live="polite" style="display:none"></div>
            </form>

            <div class="actions" style="margin-top: 18px;">
                <a href="/html/index.html" class="link">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.port === '5500'
            ? `${window.location.protocol}//${window.location.hostname}:5000`
            : '';
        const LOGIN_PAGE_URL = API_BASE ? `${API_BASE}/html/index.html` : '/html/index.html';
        const form = document.getElementById('reset-password-form');
        const msg = document.getElementById('reset-password-msg');
        const submitBtn = document.getElementById('reset-password-submit-btn');
        const submitLabel = submitBtn.querySelector('.btn-label');

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.classList.toggle('is-loading', isLoading);
            submitLabel.textContent = isLoading ? 'UPDATING PASSWORD...' : 'RESET PASSWORD';
        }

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = getTokenFromUrl();
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-new-password').value;

            msg.style.display = 'none';

            if (!token) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Reset token is missing from the URL.';
                return;
            }

            if (password.length < 6) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Password must be at least 6 characters.';
                return;
            }

            if (password !== confirmPassword) {
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Passwords do not match.';
                return;
            }

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/staff/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, confirmPassword })
                });

                const data = await response.json();

                msg.style.display = 'block';
                if (response.ok) {
                    msg.style.color = '#15803d';
                    msg.textContent = data.message || 'Password reset successful. Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = LOGIN_PAGE_URL;
                    }, 1500);
                } else {
                    msg.style.color = '#dc2626';
                    msg.textContent = data.message || 'Failed to reset password.';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                msg.style.display = 'block';
                msg.style.color = '#dc2626';
                msg.textContent = 'Server connection failed.';
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
